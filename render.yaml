services:
  - type: web
    name: maa-fashion-point-backend
    env: node
    region: singapore   # closest to India; change to oregon/frankfurt if you prefer
    plan: free          # upgrade to Starter ($7/mo) for always-on
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000       # Render assigns this automatically; keep 10000 as default        # fill in the Render dashboard (never commit secrets)
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 30d
      - key: FRONTEND_URL
        value: https://nik123n.github.io   # your GitHub Pages origin
      # --- optional services (fill in dashboard) ---
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false


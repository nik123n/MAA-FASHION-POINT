name: MAA Fashion Point — CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Backend ─────────────────────────────────────────────────────────────
  backend-check:
    name: Backend Lint & Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check env secrets configured
        run: |
          echo "Checking that required GitHub Secrets are configured..."
          echo "(Missing secrets will cause deployment to fail silently — configure in repo Settings > Secrets)"

      # Fail build on HIGH or CRITICAL vulnerabilities
      - name: Security audit (fail on high+)
        run: npm audit --audit-level=high

  # ── 2. Frontend ────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build & Verify
    runs-on: ubuntu-latest
    needs: backend-check
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Build MUST succeed — fails if any import errors, missing deps, etc.
      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_RAZORPAY_KEY_ID: ${{ secrets.VITE_RAZORPAY_KEY_ID }}

  # ── 3. Deploy (only on main push, after both checks pass) ─────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Backend Deploy (Render)
        run: |
          if [ -n "$RENDER_DEPLOY_URL" ]; then
            curl -s -X POST "$RENDER_DEPLOY_URL" -H "Content-Type: application/json"
          else
            echo "Skipping Render deploy — RENDER_DEPLOY_HOOK_URL not configured"
          fi
        env:
          RENDER_DEPLOY_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Trigger Frontend Deploy (Vercel)
        run: |
          if [ -n "$VERCEL_DEPLOY_URL" ]; then
            curl -s -X POST "$VERCEL_DEPLOY_URL"
          else
            echo "Skipping Vercel deploy — VERCEL_DEPLOY_HOOK_URL not configured"
          fi
        env:
          VERCEL_DEPLOY_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
